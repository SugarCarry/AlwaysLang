name: Windows Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_VERSION: "4.0"
  RELEASE_TAG: "v4.0"

jobs:
  build:
    name: Build Windows portable package
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2019_64"
          modules: "qt5compat qtshadertools"
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DGIT_SEMVER=${{ env.RELEASE_VERSION }}

      - name: Build
        run: cmake --build build --target AlwaysLang --parallel

      - name: Deploy Qt runtime
        run: cmake --build build --target Script-DeployRelease

      - name: Bundle MSVC runtime
        shell: pwsh
        run: |
          # windeployqt --compiler-runtime 仅复制 vc_redist.x64.exe 安装器，
          # 便携包需要松散的 CRT DLL，否则在未安装运行库的机器上双击无反应。
          Remove-Item -Path "dist/vc_redist.x64.exe" -ErrorAction SilentlyContinue
          $crtDir = Get-ChildItem -Path "$env:VCToolsRedistDir\x64" -Filter "Microsoft.VC*.CRT" -Directory |
            Sort-Object Name -Descending | Select-Object -First 1
          if (-not $crtDir) {
            throw "Could not locate Microsoft.VC*.CRT under $env:VCToolsRedistDir\x64"
          }
          Copy-Item -Path (Join-Path $crtDir.FullName "*.dll") -Destination "dist" -Force
          Write-Host "Copied CRT runtime from $($crtDir.FullName):"
          Get-ChildItem -Path "dist" -Filter "*140*.dll" | Select-Object Name

      - name: Check package
        shell: pwsh
        run: |
          if (!(Test-Path "dist/AlwaysLang.exe")) {
            throw "dist/AlwaysLang.exe was not generated."
          }
          Get-ChildItem -Path dist

      - name: Archive portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path dist\* -DestinationPath artifacts\AlwaysLang-windows-portable.zip -Force

      - name: Build installer
        shell: pwsh
        working-directory: package
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          $outputDir = Join-Path $env:GITHUB_WORKSPACE "artifacts"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null
          & $iscc "/O$outputDir" "/FAlwaysLang-installer" InstallerScript.iss
          $installerPath = Join-Path $outputDir "AlwaysLang-installer.exe"
          if (!(Test-Path $installerPath)) {
            Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter "*.exe" | Select-Object FullName
            throw "$installerPath was not generated."
          }

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: AlwaysLang-windows-portable
          path: artifacts/AlwaysLang-windows-portable.zip
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: AlwaysLang-windows-installer
          path: artifacts/AlwaysLang-installer.exe
          if-no-files-found: error

      - name: Move release tag to current commit
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "${env:RELEASE_TAG}" "${env:GITHUB_SHA}" -m "AlwaysLang ${env:RELEASE_VERSION}"
          git push --force origin "refs/tags/${env:RELEASE_TAG}"

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: AlwaysLang ${{ env.RELEASE_VERSION }}
          body: |
            ## AlwaysLang ${{ env.RELEASE_VERSION }}

            4.0 起目标语言不再写死为 ENG / 中 / 한，而是自动检测系统已安装的输入语言，任意语言均可设为某个软件的固定输入语言。

            ### 新增
            - 自动检测系统已安装的输入语言，目标语言下拉列表动态生成
            - 任意已安装语言（日语、法语、俄语等）都可设为某个软件的固定输入语言
            - 同一语言的多地区布局（如 en-US / en-GB）在列表中可区分选择；已处于同语言时不会强制切换地区变体，尊重手动选择
            - CMD / PowerShell 经典控制台窗口中浮层真正跟随光标位置，不再固定在窗口角落（Windows Terminal 暂不支持）
            - 浮窗背景颜色可自定义；默认「自动」模式实时感知浮窗背后画面的明暗（深色背景配深底白字，浅色背景配浅底黑字），文字颜色按背景亮度自适应
            - 语言下拉框悬浮显示完整语言名称
            - 浮层显示扩展：日语显示「日」，其他语言显示 ISO 语言代码（如 FR / RU）

            ### 移除
            - 移除「始终英文 (Always ENG)」全局强制模式：与按软件设置目标语言的功能重复且交互易混淆，
              相同效果可通过为软件启用英文目标语言实现

            ### 兼容
            - 旧版本按 ENG / 中 / 한 保存的软件配置在启动时自动迁移，无需重新设置
            - 设置里保存的目标语言若未安装，自动回退到同语言的其他地区布局

            ### 界面优化
            - 首页标题等缺失的中文翻译已补齐，界面完全中文化
            - 应用列表图标统一等比缩放到相同尺寸，不再忽大忽小（已添加的应用启动时自动刷新图标）
            - 浮窗不透明度滑条改为固定适中宽度，不再拉满整行
            - 设置页新增「浮窗颜色」色块选择

            ### 下载说明
            - `AlwaysLang-installer.exe`：安装版
            - `AlwaysLang-windows-portable.zip`：免安装便携版，解压后直接运行 `AlwaysLang.exe`

            > 开启「开机自启动」需要管理员权限，首次勾选请以管理员身份运行一次。
          files: |
            artifacts/AlwaysLang-windows-portable.zip
            artifacts/AlwaysLang-installer.exe
          overwrite_files: true
          draft: false
          prerelease: false
          make_latest: true
